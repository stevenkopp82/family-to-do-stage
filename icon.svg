<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#4A90D9"/>

  <!-- House body -->
  <rect x="152" y="264" width="208" height="160" rx="12" fill="white"/>

  <!-- Roof -->
  <polygon points="256,120 112,280 400,280" fill="white"/>

  <!-- Chimney -->
  <rect x="300" y="148" width="36" height="72" rx="6" fill="white"/>

  <!-- Checkmark inside house -->
  <polyline points="188,340 232,384 324,280"
    fill="none"
    stroke="#4A90D9"
    stroke-width="36"
    stroke-linecap="round"
    stroke-linejoin="round"/>
</svg>
